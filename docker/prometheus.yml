# ─── Prometheus Configuration for Robin AI Monitoring ────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'robin-app'
    static_configs:
      - targets: ['robin-app:8501']
    metrics_path: '/_stcore/metrics'

  - job_name: 'tor-proxy'
    static_configs:
      - targets: ['tor-proxy:9051']
    metrics_path: '/metrics'

  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9090']